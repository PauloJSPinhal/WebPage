<div class="row">
    <div class="col-md-12">
        <h4 class="text-primary mb-3">Fotografia</h4>
        <p>A fotografia é um dos meus hobbies favoritos.</p>
        <p>Aqui partilho algumas capturas do meu olhar sobre o mundo enquanto trabalho no meu portfólio profissional</p>
    </div>
    <div class="row g-3" id="gallery"></div>

<!-- Botões de Ação Obrigatórios -->
<div class="section-actions">
    <button class="btn-action-close"><i class="fa-solid fa-xmark me-2"></i>Fechar Secção</button>
    <button class="btn-action-top"><i class="fa-solid fa-arrow-up me-2"></i>Topo</button>
</div>

<div id="lightbox" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center;">
    <span onclick="closeLightbox()" style="position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;">&times;</span>
    <button onclick="changePhoto(-1)" style="position:absolute; left:20px; background:none; border:none; color:white; font-size:50px; cursor:pointer;">&#10094;</button>
    <img id="lightbox-img" src="" style="max-width:80%; max-height:80%; border-radius:5px;">
    <button onclick="changePhoto(1)" style="position:absolute; right:20px; background:none; border:none; color:white; font-size:50px; cursor:pointer;">&#10095;</button>
</div>

<script>
    const pastaOrigem = "images/fotos/";
    const gallery = document.getElementById('gallery');
    let fotos = []; // O array que será preenchido pelo ficheiro
    let currentIndex = 0;

    // Função para carregar o ficheiro de texto
    async function carregarFotos() {
        try {
            const resposta = await fetch('images/fotos/lista.txt');
            const texto = await resposta.text();
            
            // Transforma o texto em array, dividindo por linhas e removendo espaços vazios
            fotos = texto.split('\n').map(nome => nome.trim()).filter(nome => nome !== "");
            
            // Após carregar, desenha a galeria
            gerarGaleria();
        } catch (erro) {
            console.error("Erro ao carregar a lista de fotos:", erro);
        }
    }

    function gerarGaleria() {
        fotos.forEach((foto, index) => {
            const div = document.createElement('div');
            div.className = "col-12 col-md-4";
            div.innerHTML = `
                <img src="${pastaOrigem}${foto}" class="img-fluid rounded shadow-sm" 
                style="cursor:pointer; height:250px; width:100%; object-fit:cover;" 
                onclick="openLightbox(${index})">
            `;
            gallery.appendChild(div);
        });
    }

    // Funções de Lightbox (mesmas de antes)
    function openLightbox(index) {
        currentIndex = index;
        document.getElementById('lightbox-img').src = pastaOrigem + fotos[currentIndex];
        document.getElementById('lightbox').style.display = 'flex';
    }

    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }

    function changePhoto(step) {
        currentIndex = (currentIndex + step + fotos.length) % fotos.length;
        document.getElementById('lightbox-img').src = pastaOrigem + fotos[currentIndex];
    }

    // Iniciar o carregamento
    carregarFotos();
</script>
